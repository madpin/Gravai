name: Release

on:
  push:
    branches: [main]

# Don't cancel in-progress releases — a partial release (created but not uploaded) is worse
# than a redundant one. Concurrent pushes each get their own SHA-suffixed tag anyway.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CFLAGS: "-march=armv8.2-a"
  CXXFLAGS: "-march=armv8.2-a"

jobs:
  build-and-release:
    name: Build & Release (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
            security create-keychain -p "" build.keychain
            security import /tmp/certificate.p12 -k build.keychain \
              -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-keychain-settings -lut 21600 build.keychain
            security list-keychains -d user \
              -s build.keychain $(security list-keychains -d user | tr -d '"')
            security unlock-keychain -p "" build.keychain
            security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
            rm /tmp/certificate.p12
            echo "✅ Signing certificate imported"
          else
            echo "⚠️  APPLE_CERTIFICATE not set — build will be ad-hoc signed"
          fi

      - name: Build Tauri app (with updater signing)
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Gravai v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Ad-hoc sign and collect artifacts
        id: artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Determine signing identity: use stable cert if available, fall back to ad-hoc
          SIGN_ID="${APPLE_CERTIFICATE:+Gravai Developer Certificate}"
          SIGN_ID="${SIGN_ID:--}"

          # 1. Sign the .app with explicit cert-based requirements so TCC persists across updates.
          #    Sign the binary first (TCC watches the binary's DR, not the bundle's), then the bundle.
          APP=$(find target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP" ]; then
            SIGN_REQS='= designated => identifier "com.gravai.app" and certificate leaf = H"FEC8D826B9873249819360FDEB415484D47B0283"'
            BINARY="$APP/Contents/MacOS/gravai-app"
            if [ -f "$BINARY" ]; then
              codesign --force --sign "$SIGN_ID" \
                --requirements "$SIGN_REQS" \
                --entitlements src-tauri/Entitlements.plist "$BINARY"
            fi
            codesign --force --sign "$SIGN_ID" \
              --requirements "$SIGN_REQS" \
              --entitlements src-tauri/Entitlements.plist "$APP"
            echo "Signed ($SIGN_ID): $APP"
          fi

          # 2. Recreate DMG from the signed .app so users don't get "damaged" error.
          #    pnpm tauri build creates the DMG before our signing step, so the original
          #    DMG contains the unsigned .app. We rebuild it here with the signed copy.
          STAGING=$(mktemp -d)
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          NEW_DMG="target/release/bundle/dmg/Gravai_${VERSION}_aarch64.dmg"
          hdiutil create -volname "Gravai" -srcfolder "$STAGING" -ov -format UDZO "$NEW_DMG"
          codesign --force --sign "$SIGN_ID" "$NEW_DMG"
          rm -rf "$STAGING"
          echo "Rebuilt DMG from signed .app: $NEW_DMG"

          # 3. Recreate .app.tar.gz from the signed .app and re-sign for the in-app updater.
          #    The original tar.gz was also built from the unsigned .app.
          APP_DIR=$(dirname "$APP")
          APP_BASENAME=$(basename "$APP")
          TARGZ="${APP_DIR}/${APP_BASENAME}.tar.gz"
          tar -czf "$TARGZ" -C "$APP_DIR" "$APP_BASENAME"
          pnpm tauri signer sign "$TARGZ"
          SIG="${TARGZ}.sig"
          echo "Recreated and re-signed: $TARGZ"

          echo "dmg=${NEW_DMG}" >> $GITHUB_OUTPUT
          echo "targz=${TARGZ}" >> $GITHUB_OUTPUT

          # Build latest.json for the in-app updater endpoint
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          VERSION="${{ steps.version.outputs.version }}"
          if [ -n "$TARGZ" ] && [ -f "$SIG" ]; then
            SIGNATURE=$(cat "$SIG")
            FILENAME=$(basename "$TARGZ")
            URL="https://github.com/madpin/Gravai/releases/download/${TAG}/${FILENAME}"
            cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See full release notes on GitHub.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": { "signature": "${SIGNATURE}", "url": "${URL}" },
              "darwin-x86_64":  { "signature": "${SIGNATURE}", "url": "${URL}" }
            }
          }
          EOF
          else
            echo "WARNING: No signed .app.tar.gz found. Was TAURI_SIGNING_PRIVATE_KEY set in secrets?"
            cat > latest.json << EOF
          { "version": "${VERSION}", "notes": "", "pub_date": "${PUB_DATE}", "platforms": {} }
          EOF
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            **Gravai ${{ steps.version.outputs.version }}** — Audio Capture & AI Meeting Intelligence

            Built from commit ${{ github.sha }}

            ### Installation
            1. Download `Gravai.dmg` and drag Gravai to Applications
            2. **First launch:** macOS will block Gravai because it isn't notarized. To allow it:
               - Open normally (double-click), dismiss the warning, then go to **System Settings → Privacy & Security → scroll down → Open Anyway**
               - Or run in Terminal: `xattr -dr com.apple.quarantine /Applications/Gravai.app`
               - ⚠️ Right-click → Open no longer bypasses Gatekeeper on macOS Sequoia and later
            3. Gravai will download the Whisper transcription model on first run (~1.5 GB)

            ### In-App Updates
            Once installed, Gravai updates itself automatically. You can also go to **Settings → App Updates → Check Now**.

            ### Requirements
            - macOS 13+ (Ventura or later)
            - Apple Silicon recommended (M1/M2/M3/M4)
            - [Ollama](https://ollama.ai/) for AI summaries (optional)
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.targz }}
            latest.json
