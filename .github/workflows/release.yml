name: Release

on:
  push:
    branches: [main]

# Don't cancel in-progress releases — a partial release (created but not uploaded) is worse
# than a redundant one. Concurrent pushes each get their own SHA-suffixed tag anyway.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CFLAGS: "-march=armv8.2-a"
  CXXFLAGS: "-march=armv8.2-a"

jobs:
  build-and-release:
    name: Build & Release (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Same key prefix as CI so release benefits from CI cache warm-ups.
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Tauri app (with updater signing)
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Gravai v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Ad-hoc sign and collect artifacts
        id: artifacts
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Ad-hoc sign the .app bundle (removes macOS quarantine "damaged" error)
          APP=$(find target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP" ]; then
            codesign --force --deep --sign - "$APP"
            echo "Ad-hoc signed: $APP"
          fi

          DMG=$(find target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          # Tauri produces .app.tar.gz + .app.tar.gz.sig when signing key is set
          TARGZ=$(find target/release/bundle/macos -name "*.app.tar.gz" 2>/dev/null | head -1)
          SIG="${TARGZ}.sig"

          echo "dmg=${DMG}" >> $GITHUB_OUTPUT
          echo "targz=${TARGZ}" >> $GITHUB_OUTPUT

          # Build latest.json for the in-app updater endpoint
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          VERSION="${{ steps.version.outputs.version }}"
          if [ -n "$TARGZ" ] && [ -f "$SIG" ]; then
            SIGNATURE=$(cat "$SIG")
            FILENAME=$(basename "$TARGZ")
            URL="https://github.com/madpin/Gravai/releases/download/${TAG}/${FILENAME}"
            cat > latest.json << EOF
{
  "version": "${VERSION}",
  "notes": "See full release notes on GitHub.",
  "pub_date": "${PUB_DATE}",
  "platforms": {
    "darwin-aarch64": { "signature": "${SIGNATURE}", "url": "${URL}" },
    "darwin-x86_64":  { "signature": "${SIGNATURE}", "url": "${URL}" }
  }
}
EOF
          else
            echo "WARNING: No signed .app.tar.gz found. Was TAURI_SIGNING_PRIVATE_KEY set in secrets?"
            cat > latest.json << EOF
{ "version": "${VERSION}", "notes": "", "pub_date": "${PUB_DATE}", "platforms": {} }
EOF
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            **Gravai ${{ steps.version.outputs.version }}** — Audio Capture & AI Meeting Intelligence

            Built from commit ${{ github.sha }}

            ### Installation
            1. Download `Gravai.dmg` and drag Gravai to Applications
            2. If macOS says "damaged and can't be opened", run in Terminal:
               ```
               xattr -cr /Applications/Gravai.app
               ```
            3. On first launch, allow it in System Settings → Privacy & Security
            4. Gravai will download the Whisper transcription model on first run (~1.5 GB)

            ### In-App Updates
            Once installed, Gravai updates itself automatically. You can also go to **Settings → App Updates → Check Now**.

            ### Requirements
            - macOS 13+ (Ventura or later)
            - Apple Silicon recommended (M1/M2/M3/M4)
            - [Ollama](https://ollama.ai/) for AI summaries (optional)
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.targz }}
            latest.json
