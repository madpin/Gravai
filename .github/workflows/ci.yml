name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR when a newer commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CFLAGS: "-march=armv8.2-a"
  CXXFLAGS: "-march=armv8.2-a"

jobs:
  rust-checks:
    name: Rust checks
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        # gravai-audio links ScreenCaptureKit (Swift runtime) which isn't
        # available in the CI sandbox; exclude it to avoid SIGABRT/dylib errors.
        run: cargo test --workspace --lib --exclude gravai-audio

  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build

  tauri-build:
    name: Tauri build (macOS)
    runs-on: macos-14
    # Only run on PRs — pushes to main are built & released by release.yml
    if: github.event_name == 'pull_request'
    needs: [rust-checks, frontend-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          # Secrets are not available for PRs from forks; build will succeed without signing.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
